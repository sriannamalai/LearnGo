# ========================================
# Prometheus Configuration
# ========================================
# Prometheus scrapes metrics from the TaskFlow /metrics endpoint.
# This config is mounted into the Prometheus container.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "taskflow"
    static_configs:
      - targets: ["taskflow:8080"]
    metrics_path: "/metrics"
    scrape_interval: 10s
